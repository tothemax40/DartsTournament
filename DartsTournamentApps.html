<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organisateur de Tournoi - Matchs à N joueurs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .config-section {
            background-color: #f0f8ff;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }
        .config-section h2 {
            margin-top: 0;
            color: #444;
        }
        .config-form {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .config-form div {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .config-form label {
            font-weight: bold;
        }
        .config-form input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        .config-form input[type="text"] {
            width: 200px;
        }
        .config-form input[type="number"] {
            width: 60px;
        }
        .config-form button {
            padding: 8px 15px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            height: 40px;
            margin-top: auto;
        }
        .config-form button:hover {
            background-color: #0b7dda;
        }
        .phase {
            margin-bottom: 30px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        h2 {
            margin-top: 0;
            color: #444;
        }
        .pool {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        .pool-group {
            flex: 1;
            min-width: 250px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: white;
        }
        .pool-group h3 {
            margin-top: 0;
            text-align: center;
            color: #555;
        }
        .player {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            margin: 5px 0;
            background-color: #eee;
            border-radius: 3px;
        }
        .player input {
            flex: 1;
            padding: 5px;
            margin-right: 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        .player .points {
            width: 40px;
            text-align: center;
            font-weight: bold;
        }
        .pool-matches {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .match {
            flex: 1;
            min-width: 250px;
            display: flex;
            flex-direction: column;
            padding: 15px;
            margin: 10px 0;
            background-color: #e7f3ff;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .match.recorded {
            background-color: #d4edda;
            border-color: #28a745;
        }
        .match h4 {
            margin-top: 0;
            text-align: center;
            color: #555;
        }
        .match-result {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 10px;
        }
        .match-result div {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .match-result input {
            width: 120px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        .match-result select {
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 3px;
            flex: 1;
        }
        button {
            padding: 8px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin-top: 10px;
            align-self: center;
        }
        button:hover {
            background-color: #45a049;
        }
        button.modify-btn {
            background-color: #ffc107;
        }
        button.modify-btn:hover {
            background-color: #e0a800;
        }
        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .ranking-table th, .ranking-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .ranking-table th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        .ranking-table tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .ranking-table .qualified {
            background-color: #d4edda !important;
            font-weight: bold;
        }
        .bracket {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        .bracket-round {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .bracket-match {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: white;
            min-width: 150px;
        }
        .bracket-match .teams {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 10px;
        }
        .bracket-match .team {
            padding: 5px;
            text-align: center;
            background-color: #eee;
            border-radius: 3px;
        }
        .bracket-match .winner {
            background-color: #4CAF50;
            color: white;
        }
        .bracket-match input {
            width: 100%;
            padding: 5px;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        .bracket-match button {
            padding: 5px 10px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .bracket-match button:hover {
            background-color: #0b7dda;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .controls button {
            padding: 10px 20px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .controls button:hover {
            background-color: #0b7dda;
        }
        .hidden {
            display: none;
        }
        .tournament-title {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="tournament-title" id="tournament-title">Organisateur de Tournoi</h1>
        
        <!-- Configuration -->
        <div class="config-section">
            <h2>Configuration du Tournoi</h2>
            <div class="config-form">
                <div>
                    <label for="tournament-name">Nom du tournoi :</label>
                    <input type="text" id="tournament-name" placeholder="Mon Tournoi" value="">
                </div>
                <div>
                    <label for="num-pools">Nombre de pools :</label>
                    <input type="number" id="num-pools" value="4" min="1" max="10">
                </div>
                <div>
                    <label for="players-per-pool">Joueurs par pool :</label>
                    <input type="number" id="players-per-pool" value="4" min="2" max="10">
                </div>
                <div>
                    <label for="matches-per-pool">Matchs par pool :</label>
                    <input type="number" id="matches-per-pool" value="3" min="1" max="10">
                </div>
                <button onclick="initPools()">Appliquer la configuration</button>
            </div>
        </div>

        <!-- Phase de Poules -->
        <div class="phase" id="pool-phase">
            <h2>Phase de Poules</h2>
            <div class="pool" id="pools-container">
                <!-- Les pools seront générés dynamiquement -->
            </div>
            <div class="controls">
                <button onclick="generatePoolMatches()">Générer les matchs de poule</button>
                <button onclick="showPoolRankings()" class="hidden" id="show-rankings-btn">Afficher les classements</button>
            </div>
            <div id="pool-matches-container"></div>
        </div>

        <!-- Classement des Pools -->
        <div class="phase hidden" id="ranking-phase">
            <h2>Classements des Pools</h2>
            <div id="rankings-container"></div>
            <div class="controls">
                <button onclick="finalizePoolPhase()" id="finalize-pool-btn">Passer à la phase finale</button>
                <button onclick="backToPoolPhase()" id="back-to-pool-btn">Retour aux matchs de poule</button>
            </div>
        </div>

        <!-- Phase Finale -->
        <div class="phase hidden" id="final-phase">
            <h2>Phase Finale (Bracket)</h2>
            <div class="bracket" id="bracket-container">
                <!-- Le bracket sera généré dynamiquement -->
            </div>
        </div>
    </div>

    <script>
        // Données du tournoi
        const tournament = {
            name: '',
            pools: [],
            poolMatches: [],
            finalBracket: [],
            currentRound: 0,
            config: {
                numPools: 4,
                playersPerPool: 4,
                matchesPerPool: 3
            }
        };

        // Initialisation des pools
        function initPools() {
            const tournamentName = document.getElementById('tournament-name').value || 'Organisateur de Tournoi';
            const numPools = parseInt(document.getElementById('num-pools').value) || 4;
            const playersPerPool = parseInt(document.getElementById('players-per-pool').value) || 4;
            const matchesPerPool = parseInt(document.getElementById('matches-per-pool').value) || 3;
            
            tournament.name = tournamentName;
            tournament.config = { numPools, playersPerPool, matchesPerPool };
            tournament.pools = [];
            tournament.poolMatches = [];
            
            // Mettre à jour le titre du tournoi
            document.getElementById('tournament-title').textContent = tournamentName;
            
            const poolsContainer = document.getElementById('pools-container');
            poolsContainer.innerHTML = '';
            
            for (let i = 0; i < numPools; i++) {
                const pool = {
                    id: i + 1,
                    name: `Pool ${String.fromCharCode(65 + i)}`,
                    players: [],
                    matches: []
                };
                
                for (let j = 0; j < playersPerPool; j++) {
                    pool.players.push({ id: j + 1, name: '', totalPoints: 0 });
                }
                
                tournament.pools.push(pool);
                
                const poolDiv = document.createElement('div');
                poolDiv.className = 'pool-group';
                poolDiv.innerHTML = `
                    <h3>${pool.name}</h3>
                    ${pool.players.map((player, index) => `
                        <div class="player">
                            <input type="text" placeholder="Joueur ${index + 1}" 
                                   onchange="updatePlayerName(${i}, ${index}, this.value)">
                            <span class="points" id="points-${i}-${index}">0</span>
                        </div>
                    `).join('')}
                `;
                poolsContainer.appendChild(poolDiv);
            }
            
            // Réinitialiser les matchs de poule et les classements
            document.getElementById('pool-matches-container').innerHTML = '';
            document.getElementById('show-rankings-btn').classList.add('hidden');
            document.getElementById('ranking-phase').classList.add('hidden');
            document.getElementById('final-phase').classList.add('hidden');
            document.getElementById('pool-phase').classList.remove('hidden');
        }

        // Mise à jour du nom d'un joueur
        function updatePlayerName(poolIndex, playerIndex, name) {
            tournament.pools[poolIndex].players[playerIndex].name = name;
        }

        // Génération des matchs de poule
        function generatePoolMatches() {
            const matchesContainer = document.getElementById('pool-matches-container');
            matchesContainer.innerHTML = '';
            tournament.poolMatches = [];
            
            tournament.pools.forEach((pool, poolIndex) => {
                const poolMatchesDiv = document.createElement('div');
                poolMatchesDiv.className = 'pool-group';
                poolMatchesDiv.innerHTML = `<h3>Matchs - ${pool.name}</h3>`;
                
                const matchesDiv = document.createElement('div');
                matchesDiv.className = 'pool-matches';
                
                // Créer les matchs pour ce pool
                for (let matchNum = 1; matchNum <= tournament.config.matchesPerPool; matchNum++) {
                    const matchDiv = document.createElement('div');
                    matchDiv.className = 'match';
                    matchDiv.id = `match-${poolIndex}-${matchNum - 1}`;
                    
                    // Générer les options de rang en fonction du nombre de joueurs
                    const rankOptions = [];
                    for (let rank = 1; rank <= pool.players.length; rank++) {
                        const points = pool.players.length - rank + 1;
                        rankOptions.push(`<option value="${rank}">${rank}ème (${points} pt${points > 1 ? 's' : ''})</option>`);
                    }
                    
                    const matchHtml = `
                        <h4>Match ${matchNum}</h4>
                        <div class="match-result" id="match-result-${poolIndex}-${matchNum - 1}">
                            ${pool.players.map((player, index) => `
                                <div>
                                    <input type="text" value="${player.name || 'Joueur ' + (index + 1)}" readonly>
                                    <select id="rank-${poolIndex}-${matchNum - 1}-${index}" 
                                            onchange="updateRankOptions(${poolIndex}, ${matchNum - 1})">
                                        <option value="0">--</option>
                                        ${rankOptions.join('')}
                                    </select>
                                </div>
                            `).join('')}
                        </div>
                        <button onclick="recordPoolMatch(${poolIndex}, ${matchNum - 1})" id="match-btn-${poolIndex}-${matchNum - 1}">Enregistrer le match</button>
                    `;
                    matchDiv.innerHTML = matchHtml;
                    matchesDiv.appendChild(matchDiv);
                }
                
                poolMatchesDiv.appendChild(matchesDiv);
                matchesContainer.appendChild(poolMatchesDiv);
            });
            
            document.getElementById('show-rankings-btn').classList.remove('hidden');
        }

        // Mise à jour des options de rang en fonction des sélections
        function updateRankOptions(poolIndex, matchIndex) {
            const pool = tournament.pools[poolIndex];
            const selectedRanks = [];
            
            // Récupérer tous les rangs déjà sélectionnés dans ce match
            for (let i = 0; i < pool.players.length; i++) {
                const rank = parseInt(document.getElementById(`rank-${poolIndex}-${matchIndex}-${i}`).value);
                if (rank) selectedRanks.push(rank);
            }
            
            // Masquer les rangs déjà sélectionnés pour les autres joueurs
            for (let i = 0; i < pool.players.length; i++) {
                const select = document.getElementById(`rank-${poolIndex}-${matchIndex}-${i}`);
                const currentRank = parseInt(select.value);
                const options = select.querySelectorAll('option');
                
                options.forEach(opt => {
                    const rankValue = parseInt(opt.value);
                    if (rankValue && selectedRanks.includes(rankValue) && rankValue !== currentRank) {
                        opt.style.display = 'none';
                    } else {
                        opt.style.display = '';
                    }
                });
            }
        }

        // Enregistrement du résultat d'un match de poule
        function recordPoolMatch(poolIndex, matchIndex) {
            const pool = tournament.pools[poolIndex];
            const matchDiv = document.getElementById(`match-${poolIndex}-${matchIndex}`);
            const button = document.getElementById(`match-btn-${poolIndex}-${matchIndex}`);
            
            // Vérifier que tous les rangs sont attribués
            const ranks = [];
            for (let i = 0; i < pool.players.length; i++) {
                const rank = parseInt(document.getElementById(`rank-${poolIndex}-${matchIndex}-${i}`).value);
                ranks.push(rank);
            }
            
            const expectedRanks = Array.from({ length: pool.players.length }, (_, i) => i + 1);
            if (!ranks.every(r => r >= 1 && r <= pool.players.length) || new Set(ranks).size !== pool.players.length) {
                alert(`Veuillez attribuer un rang unique (1 à ${pool.players.length}) à chaque joueur.`);
                return;
            }
            
            // Attribuer les points (points = nombre de joueurs - rang + 1)
            for (let i = 0; i < pool.players.length; i++) {
                const rank = parseInt(document.getElementById(`rank-${poolIndex}-${matchIndex}-${i}`).value);
                const player = pool.players[i];
                const points = pool.players.length - rank + 1;
                player.totalPoints += points;
            }
            
            // Mise à jour de l'affichage des points
            updatePoolPoints(poolIndex);
            
            // Changer le style du match et du bouton
            matchDiv.classList.add('recorded');
            button.textContent = 'Modifier';
            button.className = 'modify-btn';
            button.onclick = function() { modifyPoolMatch(poolIndex, matchIndex, button, matchDiv); };
        }

        // Modifier un match de poule
        function modifyPoolMatch(poolIndex, matchIndex, button, matchDiv) {
            const pool = tournament.pools[poolIndex];
            
            // Réinitialiser les points des joueurs pour ce match
            for (let i = 0; i < pool.players.length; i++) {
                const rank = parseInt(document.getElementById(`rank-${poolIndex}-${matchIndex}-${i}`).value);
                const player = pool.players[i];
                const points = pool.players.length - rank + 1;
                player.totalPoints -= points;
            }
            
            // Réinitialiser les options des menus déroulants
            for (let i = 0; i < pool.players.length; i++) {
                const select = document.getElementById(`rank-${poolIndex}-${matchIndex}-${i}`);
                const options = select.querySelectorAll('option');
                options.forEach(opt => opt.style.display = '');
                select.value = '0';
            }
            
            // Mise à jour de l'affichage des points
            updatePoolPoints(poolIndex);
            
            // Réinitialiser le style du match et du bouton
            matchDiv.classList.remove('recorded');
            button.textContent = 'Enregistrer le match';
            button.className = '';
            button.onclick = function() { recordPoolMatch(poolIndex, matchIndex); };
        }

        // Mise à jour des points des joueurs dans un pool
        function updatePoolPoints(poolIndex) {
            const pool = tournament.pools[poolIndex];
            pool.players.forEach((player, index) => {
                document.getElementById(`points-${poolIndex}-${index}`).textContent = player.totalPoints;
            });
        }

        // Afficher les classements des pools
        function showPoolRankings() {
            // Vérifier que tous les matchs sont enregistrés
            for (let poolIndex = 0; poolIndex < tournament.pools.length; poolIndex++) {
                for (let matchIndex = 0; matchIndex < tournament.config.matchesPerPool; matchIndex++) {
                    const matchDiv = document.getElementById(`match-${poolIndex}-${matchIndex}`);
                    if (!matchDiv.classList.contains('recorded')) {
                        alert(`Veuillez enregistrer tous les matchs de poule avant de continuer.`);
                        return;
                    }
                }
            }
            
            // Trier les joueurs de chaque pool par points
            tournament.pools.forEach(pool => {
                pool.players.sort((a, b) => b.totalPoints - a.totalPoints);
            });
            
            // Afficher les classements
            const rankingsContainer = document.getElementById('rankings-container');
            rankingsContainer.innerHTML = '';
            
            tournament.pools.forEach((pool, poolIndex) => {
                const poolRankingDiv = document.createElement('div');
                poolRankingDiv.className = 'pool-group';
                poolRankingDiv.innerHTML = `<h3>${pool.name}</h3>`;
                
                const table = document.createElement('table');
                table.className = 'ranking-table';
                table.innerHTML = `
                    <thead>
                        <tr>
                            <th>Position</th>
                            <th>Joueur</th>
                            <th>Points</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${pool.players.map((player, index) => `
                            <tr class="${index < 2 ? 'qualified' : ''}">
                                <td>${index + 1}</td>
                                <td>${player.name || 'Joueur ' + player.id}</td>
                                <td>${player.totalPoints}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                `;
                poolRankingDiv.appendChild(table);
                rankingsContainer.appendChild(poolRankingDiv);
            });
            
            // Masquer la phase de poule et afficher les classements
            document.getElementById('pool-phase').classList.add('hidden');
            document.getElementById('ranking-phase').classList.remove('hidden');
        }

        // Retour à la phase de poule
        function backToPoolPhase() {
            document.getElementById('pool-phase').classList.remove('hidden');
            document.getElementById('ranking-phase').classList.add('hidden');
        }

        // Finalisation de la phase de poule
        function finalizePoolPhase() {
            // Récupérer les 2 premiers de chaque pool pour la phase finale
            const finalists = [];
            tournament.pools.forEach(pool => {
                finalists.push(pool.players[0]);
                finalists.push(pool.players[1]);
            });
            
            // Générer le bracket
            generateBracket(finalists);
            
            // Masquer les classements et afficher la phase finale
            document.getElementById('ranking-phase').classList.add('hidden');
            document.getElementById('final-phase').classList.remove('hidden');
        }

        // Génération du bracket
        function generateBracket(players) {
            const bracketContainer = document.getElementById('bracket-container');
            bracketContainer.innerHTML = '';
            
            // Quart de finale
            const quarterFinals = [];
            for (let i = 0; i < players.length; i += 2) {
                quarterFinals.push({
                    player1: players[i],
                    player2: players[i + 1],
                    winner: null
                });
            }
            tournament.finalBracket = [quarterFinals, [], []];
            
            // Afficher les quarts de finale
            const quarterFinalsDiv = document.createElement('div');
            quarterFinalsDiv.className = 'bracket-round';
            quarterFinalsDiv.innerHTML = '<h3>Quarts de Finale</h3>';
            
            quarterFinals.forEach((match, index) => {
                const matchDiv = document.createElement('div');
                matchDiv.className = 'bracket-match';
                matchDiv.innerHTML = `
                    <div class="teams">
                        <div class="team">${match.player1.name || 'Joueur ' + match.player1.id}</div>
                        <div class="team">${match.player2.name || 'Joueur ' + match.player2.id}</div>
                    </div>
                    <input type="text" placeholder="Vainqueur" id="qf-winner-${index}">
                    <button onclick="recordFinalMatch(0, ${index})">Enregistrer</button>
                `;
                quarterFinalsDiv.appendChild(matchDiv);
            });
            bracketContainer.appendChild(quarterFinalsDiv);
            
            // Demi-finales (à remplir plus tard)
            const semiFinalsDiv = document.createElement('div');
            semiFinalsDiv.className = 'bracket-round';
            semiFinalsDiv.innerHTML = '<h3>Demi-Finales</h3>';
            semiFinalsDiv.id = 'semi-finals';
            bracketContainer.appendChild(semiFinalsDiv);
            
            // Finale (à remplir plus tard)
            const finalDiv = document.createElement('div');
            finalDiv.className = 'bracket-round';
            finalDiv.innerHTML = '<h3>Finale</h3>';
            finalDiv.id = 'final';
            bracketContainer.appendChild(finalDiv);
        }

        // Enregistrement d'un match de la phase finale
        function recordFinalMatch(round, matchIndex) {
            const winnerName = document.getElementById(`qf-winner-${matchIndex}`).value;
            
            if (round === 0) { // Quart de finale
                const match = tournament.finalBracket[round][matchIndex];
                const winner = match.player1.name === winnerName ? match.player1 : match.player2;
                tournament.finalBracket[round][matchIndex].winner = winner;
                
                // Mise à jour des demi-finales
                if (matchIndex % 2 === 1 || matchIndex === tournament.finalBracket[0].length - 1) {
                    const semiFinals = [];
                    for (let i = 0; i < tournament.finalBracket[0].length; i += 2) {
                        if (tournament.finalBracket[0][i].winner && tournament.finalBracket[0][i + 1].winner) {
                            semiFinals.push({
                                player1: tournament.finalBracket[0][i].winner,
                                player2: tournament.finalBracket[0][i + 1].winner,
                                winner: null
                            });
                        }
                    }
                    tournament.finalBracket[1] = semiFinals;
                    updateSemiFinals();
                }
            }
        }

        // Mise à jour des demi-finales
        function updateSemiFinals() {
            const semiFinalsDiv = document.getElementById('semi-finals');
            semiFinalsDiv.innerHTML = '<h3>Demi-Finales</h3>';
            
            tournament.finalBracket[1].forEach((match, index) => {
                const matchDiv = document.createElement('div');
                matchDiv.className = 'bracket-match';
                matchDiv.innerHTML = `
                    <div class="teams">
                        <div class="team">${match.player1.name}</div>
                        <div class="team">${match.player2.name}</div>
                    </div>
                    <input type="text" placeholder="Vainqueur" id="sf-winner-${index}">
                    <button onclick="recordSemiFinal(${index})">Enregistrer</button>
                `;
                semiFinalsDiv.appendChild(matchDiv);
            });
        }

        // Enregistrement d'une demi-finale
        function recordSemiFinal(matchIndex) {
            const winnerName = document.getElementById(`sf-winner-${matchIndex}`).value;
            const match = tournament.finalBracket[1][matchIndex];
            const winner = match.player1.name === winnerName ? match.player1 : match.player2;
            tournament.finalBracket[1][matchIndex].winner = winner;
            
            // Mise à jour de la finale
            if (tournament.finalBracket[1].length === 2) {
                const finalMatch = {
                    player1: tournament.finalBracket[1][0].winner,
                    player2: tournament.finalBracket[1][1].winner,
                    winner: null
                };
                tournament.finalBracket[2] = [finalMatch];
                updateFinal();
            }
        }

        // Mise à jour de la finale
        function updateFinal() {
            const finalDiv = document.getElementById('final');
            finalDiv.innerHTML = '<h3>Finale</h3>';
            
            const match = tournament.finalBracket[2][0];
            const matchDiv = document.createElement('div');
            matchDiv.className = 'bracket-match';
            matchDiv.innerHTML = `
                <div class="teams">
                    <div class="team">${match.player1.name}</div>
                    <div class="team">${match.player2.name}</div>
                </div>
                <input type="text" placeholder="Vainqueur" id="final-winner">
                <button onclick="recordFinal()">Enregistrer</button>
            `;
            finalDiv.appendChild(matchDiv);
        }

        // Enregistrement de la finale
        function recordFinal() {
            const winnerName = document.getElementById('final-winner').value;
            const match = tournament.finalBracket[2][0];
            const winner = match.player1.name === winnerName ? match.player1 : match.player2;
            tournament.finalBracket[2][0].winner = winner;
            
            // Afficher le vainqueur
            alert(`Félicitations à ${winner.name}, vainqueur du tournoi ${tournament.name} !`);
        }

        // Initialisation au chargement de la page
        window.onload = initPools;
    </script>
</body>
</html>
