<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organisateur de Tournoi - Sauvegarde Auto</title>
    <style>
        :root {
            --primary-color: #2196F3;
            --secondary-color: #4CAF50;
            --background-color: #f5f5f5;
            --container-color: #ffffff;
            --text-color: #333333;
            --light-gray: #f9f9f9;
            --border-color: #dddddd;
            --button-color: #2196F3;
            --button-hover: #0b7dda;
            --match-bg: #e7f3ff;
            --match-recorded-bg: #d4edda;
            --winner-bg: #28a745;
            --selected-bg: #4CAF50;
            --bye-bg: #ffc107;
        }
        
        [data-theme="dark"] {
            --primary-color: #1a73e8;
            --secondary-color: #34A853;
            --background-color: #121212;
            --container-color: #1e1e1e;
            --text-color: #e0e0e0;
            --light-gray: #2d2d2d;
            --border-color: #444444;
            --button-color: #1a73e8;
            --button-hover: #1557b0;
            --match-bg: #2d3a4a;
            --match-recorded-bg: #2a4d3a;
            --winner-bg: #2e7d32;
            --selected-bg: #1a73e8;
            --bye-bg: #ff9800;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--background-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: var(--container-color);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            color: var(--text-color);
        }
        
        h1, h2, h3, h4 {
            color: var(--text-color);
        }
        
        .config-section {
            background-color: var(--light-gray);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        
        .config-section h2 {
            margin-top: 0;
        }
        
        .config-form {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .config-form div {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .config-form label {
            font-weight: bold;
        }
        
        .config-form input, .config-form select {
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 3px;
            background-color: var(--container-color);
            color: var(--text-color);
        }
        
        .config-form input[type="text"] {
            width: 200px;
        }
        
        .config-form input[type="number"] {
            width: 60px;
        }
        
        .config-form button, button {
            padding: 8px 15px;
            background-color: var(--button-color);
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            height: 40px;
            margin-top: auto;
            transition: background-color 0.3s;
        }
        
        .config-form button:hover, button:hover {
            background-color: var(--button-hover);
        }
        
        button.modify-btn {
            background-color: #ffc107;
        }
        
        button.modify-btn:hover {
            background-color: #e0a800;
        }
        
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        
        .phase {
            margin-bottom: 30px;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background-color: var(--light-gray);
        }
        
        .pool {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .pool-group {
            flex: 1;
            min-width: 250px;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background-color: var(--container-color);
        }
        
        .pool-group h3 {
            margin-top: 0;
            text-align: center;
        }
        
        .player {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            margin: 5px 0;
            background-color: var(--light-gray);
            border-radius: 3px;
        }
        
        .player input {
            flex: 1;
            padding: 5px;
            margin-right: 10px;
            border: 1px solid var(--border-color);
            border-radius: 3px;
            background-color: var(--container-color);
            color: var(--text-color);
        }
        
        .player .points {
            width: 40px;
            text-align: center;
            font-weight: bold;
        }
        
        .pool-matches {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .match {
            flex: 1;
            min-width: 250px;
            display: flex;
            flex-direction: column;
            padding: 15px;
            margin: 10px 0;
            background-color: var(--match-bg);
            border-radius: 5px;
            border: 1px solid var(--border-color);
        }
        
        .match.recorded {
            background-color: var(--match-recorded-bg);
            border-color: var(--secondary-color);
        }
        
        .match h4 {
            margin-top: 0;
            text-align: center;
        }
        
        .match-result {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 10px;
        }
        
        .match-result div {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .match-result input {
            width: 120px;
            padding: 5px;
            border: 1px solid var(--border-color);
            border-radius: 3px;
            background-color: var(--container-color);
            color: var(--text-color);
        }
        
        .match-result select {
            padding: 5px;
            border: 1px solid var(--border-color);
            border-radius: 3px;
            flex: 1;
            background-color: var(--container-color);
            color: var(--text-color);
        }
        
        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        .ranking-table th, .ranking-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-color);
        }
        
        .ranking-table th {
            background-color: var(--light-gray);
            font-weight: bold;
        }
        
        .ranking-table tr:nth-child(even) {
            background-color: var(--container-color);
        }
        
        .ranking-table .qualified {
            background-color: var(--match-recorded-bg) !important;
            font-weight: bold;
        }
        
        .bracket {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        .bracket-round {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            width: 100%;
        }
        
        .bracket-round h3 {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .bracket-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 100%;
        }
        
        .bracket-match {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--container-color);
            min-width: 200px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        .bracket-match .teams {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
            width: 100%;
        }
        
        .bracket-match .team {
            padding: 10px;
            text-align: center;
            background-color: var(--light-gray);
            border-radius: 5px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-color);
        }
        
        .bracket-match .team:hover {
            background-color: var(--border-color);
        }
        
        .bracket-match .team.selected {
            background-color: var(--selected-bg);
            color: white;
            border-color: var(--selected-bg);
            font-weight: bold;
        }
        
        .bracket-match .team.winner {
            background-color: var(--winner-bg);
            color: white;
            border-color: var(--winner-bg);
            font-weight: bold;
        }
        
        .bracket-match .team.by {
            background-color: var(--bye-bg);
            color: #856404;
            border-color: var(--bye-bg);
            font-weight: bold;
        }
        
        .bracket-match button {
            padding: 8px 15px;
            background-color: var(--button-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        
        .bracket-connector {
            height: 30px;
            border-left: 2px solid var(--border-color);
            margin: 0 20px;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .controls button {
            padding: 10px 20px;
            font-size: 16px;
        }
        
        .hidden {
            display: none;
        }
        
        .tournament-title {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
        }
        
        .theme-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .theme-controls button {
            padding: 8px 15px;
            width: auto;
        }
        
        .stats-section {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background-color: var(--light-gray);
        }
        
        .stats-section h2 {
            margin-top: 0;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }
        
        .stat-card {
            padding: 15px;
            border-radius: 5px;
            background-color: var(--container-color);
            border: 1px solid var(--border-color);
            text-align: center;
        }
        
        .stat-card h4 {
            margin-top: 0;
            font-size: 16px;
        }
        
        .stat-card p {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
        }
        
        .save-load-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        .save-load-controls input[type="file"] {
            display: none;
        }
        
        .file-input-label {
            padding: 10px 15px;
            background-color: var(--button-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: inline-block;
        }
        
        .file-input-label:hover {
            background-color: var(--button-hover);
        }
        
        .auto-save-notification {
            text-align: center;
            font-size: 14px;
            color: var(--secondary-color);
            margin-top: 5px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="theme-controls">
            <button onclick="setTheme('light')">🌞 Thème Clair</button>
            <button onclick="setTheme('dark')">🌙 Thème Sombre</button>
            <select id="color-theme" onchange="changeColorTheme()">
                <option value="default">Couleurs par défaut</option>
                <option value="green">Vert</option>
                <option value="red">Rouge</option>
                <option value="purple">Violet</option>
            </select>
        </div>
        
        <h1 class="tournament-title" id="tournament-title">Organisateur de Tournoi</h1>
        
        <!-- Sauvegarde Auto -->
        <div class="save-load-controls">
            <button onclick="newTournament()">🆕 Nouveau Tournoi</button>
            <button onclick="deleteSavedTournament()">🗑️ Supprimer la sauvegarde</button>
            <label for="load-file" class="file-input-label">📂 Importer un tournoi</label>
            <input type="file" id="load-file" accept=".json" onchange="loadTournament(event)">
            <button onclick="exportTournament()">💾 Exporter le tournoi</button>
            <button onclick="exportStats()">📊 Exporter les statistiques</button>
        </div>
        <div class="auto-save-notification" id="auto-save-notification">
            Sauvegarde automatique activée (localStorage)
        </div>

        <!-- Configuration -->
        <div class="config-section">
            <h2>Configuration du Tournoi</h2>
            <div class="config-form">
                <div>
                    <label for="tournament-name">Nom du tournoi :</label>
                    <input type="text" id="tournament-name" placeholder="Mon Tournoi" value="" onchange="saveToLocalStorage()">
                </div>
                <div>
                    <label for="num-pools">Nombre de pools :</label>
                    <input type="number" id="num-pools" value="4" min="1" max="10" onchange="saveToLocalStorage()">
                </div>
                <div>
                    <label for="players-per-pool">Joueurs par pool :</label>
                    <input type="number" id="players-per-pool" value="4" min="2" max="10" onchange="saveToLocalStorage()">
                </div>
                <div>
                    <label for="matches-per-pool">Matchs par pool :</label>
                    <input type="number" id="matches-per-pool" value="3" min="1" max="10" onchange="saveToLocalStorage()">
                </div>
                <button onclick="initPools()">Appliquer la configuration</button>
            </div>
        </div>

        <!-- Phase de Poules -->
        <div class="phase" id="pool-phase">
            <h2>Phase de Poules</h2>
            <div class="pool" id="pools-container">
                <!-- Les pools seront générés dynamiquement -->
            </div>
            <div class="controls">
                <button onclick="generatePoolMatches()">Générer les matchs de poule</button>
                <button onclick="showPoolRankings()" class="hidden" id="show-rankings-btn">Afficher les classements</button>
            </div>
            <div id="pool-matches-container"></div>
        </div>

        <!-- Classement des Pools -->
        <div class="phase hidden" id="ranking-phase">
            <h2>Classements des Pools</h2>
            <div id="rankings-container"></div>
            <div class="stats-section">
                <h2>Statistiques des Joueurs</h2>
                <div class="stats-grid" id="stats-container"></div>
            </div>
            <div class="controls">
                <button onclick="finalizePoolPhase()" id="finalize-pool-btn">Passer à la phase finale</button>
                <button onclick="backToPoolPhase()" id="back-to-pool-btn">Retour aux matchs de poule</button>
            </div>
        </div>

        <!-- Phase Finale -->
        <div class="phase hidden" id="final-phase">
            <h2>Phase Finale (Bracket)</h2>
            <div class="bracket" id="bracket-container">
                <!-- Le bracket sera généré dynamiquement -->
            </div>
        </div>
    </div>

    <script>
        // Données du tournoi
        const tournament = {
            name: '',
            pools: [],
            poolMatches: [],
            finalBracket: [],
            currentRound: 0,
            config: {
                numPools: 4,
                playersPerPool: 4,
                matchesPerPool: 3
            }
        };

        // Charger le tournoi depuis le localStorage au démarrage
        function loadFromLocalStorage() {
            const savedTournament = localStorage.getItem('tournament');
            if (savedTournament) {
                try {
                    const data = JSON.parse(savedTournament);
                    tournament.name = data.name || 'Tournoi sauvegardé';
                    tournament.config = data.config || { numPools: 4, playersPerPool: 4, matchesPerPool: 3 };
                    tournament.pools = data.pools || [];
                    tournament.finalBracket = data.finalBracket || [];
                    
                    // Mettre à jour le titre
                    document.getElementById('tournament-title').textContent = tournament.name;
                    document.getElementById('tournament-name').value = tournament.name;
                    document.getElementById('num-pools').value = tournament.config.numPools;
                    document.getElementById('players-per-pool').value = tournament.config.playersPerPool;
                    document.getElementById('matches-per-pool').value = tournament.config.matchesPerPool;
                    
                    // Reconstruire les pools
                    const poolsContainer = document.getElementById('pools-container');
                    poolsContainer.innerHTML = '';
                    
                    tournament.pools.forEach((pool, poolIndex) => {
                        const poolDiv = document.createElement('div');
                        poolDiv.className = 'pool-group';
                        poolDiv.innerHTML = `
                            <h3>${pool.name}</h3>
                            ${pool.players.map((player, index) => `
                                <div class="player">
                                    <input type="text" value="${player.name || 'Joueur ' + (index + 1)}" 
                                           onchange="updatePlayerName(${poolIndex}, ${index}, this.value); saveToLocalStorage();">
                                    <span class="points" id="points-${poolIndex}-${index}">${player.totalPoints}</span>
                                </div>
                            `).join('')}
                        `;
                        poolsContainer.appendChild(poolDiv);
                    });
                    
                    // Si des matchs de poule existent, les afficher
                    if (tournament.pools.length > 0 && tournament.pools[0].players[0].matchesPlayed > 0) {
                        generatePoolMatches();
                        document.getElementById('show-rankings-btn').classList.remove('hidden');
                    }
                    
                    // Si le bracket existe, l'afficher
                    if (tournament.finalBracket.length > 0) {
                        const finalists = [];
                        tournament.pools.forEach(pool => {
                            finalists.push(pool.players[0]);
                            finalists.push(pool.players[1]);
                        });
                        generateBracket(finalists);
                        document.getElementById('pool-phase').classList.add('hidden');
                        document.getElementById('ranking-phase').classList.add('hidden');
                        document.getElementById('final-phase').classList.remove('hidden');
                    }
                    
                    console.log("Tournoi chargé depuis le localStorage");
                } catch (error) {
                    console.error("Erreur lors du chargement du tournoi :", error);
                }
            }
        }

        // Sauvegarder dans le localStorage
        function saveToLocalStorage() {
            const data = {
                name: tournament.name,
                config: tournament.config,
                pools: tournament.pools.map(pool => ({
                    id: pool.id,
                    name: pool.name,
                    players: pool.players.map(player => ({
                        id: player.id,
                        name: player.name,
                        totalPoints: player.totalPoints,
                        wins: player.wins,
                        matchesPlayed: player.matchesPlayed
                    }))
                })),
                finalBracket: tournament.finalBracket
            };
            localStorage.setItem('tournament', JSON.stringify(data));
            console.log("Tournoi sauvegardé dans le localStorage");
        }

        // Initialisation des pools
        function initPools() {
            const tournamentName = document.getElementById('tournament-name').value || 'Organisateur de Tournoi';
            const numPools = parseInt(document.getElementById('num-pools').value) || 4;
            const playersPerPool = parseInt(document.getElementById('players-per-pool').value) || 4;
            const matchesPerPool = parseInt(document.getElementById('matches-per-pool').value) || 3;
            
            tournament.name = tournamentName;
            tournament.config = { numPools, playersPerPool, matchesPerPool };
            tournament.pools = [];
            tournament.poolMatches = [];
            tournament.finalBracket = [];
            
            // Mettre à jour le titre du tournoi
            document.getElementById('tournament-title').textContent = tournamentName;
            
            const poolsContainer = document.getElementById('pools-container');
            poolsContainer.innerHTML = '';
            
            for (let i = 0; i < numPools; i++) {
                const pool = {
                    id: i + 1,
                    name: `Pool ${String.fromCharCode(65 + i)}`,
                    players: [],
                    matches: []
                };
                
                for (let j = 0; j < playersPerPool; j++) {
                    pool.players.push({ id: j + 1, name: '', totalPoints: 0, wins: 0, matchesPlayed: 0 });
                }
                
                tournament.pools.push(pool);
                
                const poolDiv = document.createElement('div');
                poolDiv.className = 'pool-group';
                poolDiv.innerHTML = `
                    <h3>${pool.name}</h3>
                    ${pool.players.map((player, index) => `
                        <div class="player">
                            <input type="text" placeholder="Joueur ${index + 1}" 
                                   onchange="updatePlayerName(${i}, ${index}, this.value); saveToLocalStorage();">
                            <span class="points" id="points-${i}-${index}">0</span>
                        </div>
                    `).join('')}
                `;
                poolsContainer.appendChild(poolDiv);
            }
            
            // Réinitialiser les matchs de poule et les classements
            document.getElementById('pool-matches-container').innerHTML = '';
            document.getElementById('show-rankings-btn').classList.add('hidden');
            document.getElementById('ranking-phase').classList.add('hidden');
            document.getElementById('final-phase').classList.add('hidden');
            document.getElementById('pool-phase').classList.remove('hidden');
            
            // Sauvegarder dans le localStorage
            saveToLocalStorage();
        }

        // Nouveau tournoi
        function newTournament() {
            localStorage.removeItem('tournament');
            location.reload();
        }

        // Supprimer la sauvegarde
        function deleteSavedTournament() {
            localStorage.removeItem('tournament');
            alert("Sauvegarde supprimée. Actualisez la page pour démarrer un nouveau tournoi.");
        }

        // Exporter le tournoi (fichier JSON)
        function exportTournament() {
            const data = {
                name: tournament.name,
                config: tournament.config,
                pools: tournament.pools.map(pool => ({
                    id: pool.id,
                    name: pool.name,
                    players: pool.players.map(player => ({
                        id: player.id,
                        name: player.name,
                        totalPoints: player.totalPoints,
                        wins: player.wins,
                        matchesPlayed: player.matchesPlayed
                    }))
                })),
                finalBracket: tournament.finalBracket
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${tournament.name || 'tournoi'}_${new Date().toISOString().slice(0, 10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Charger un tournoi depuis un fichier
        function loadTournament(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    tournament.name = data.name || 'Tournoi chargé';
                    tournament.config = data.config || { numPools: 4, playersPerPool: 4, matchesPerPool: 3 };
                    tournament.pools = data.pools || [];
                    tournament.finalBracket = data.finalBracket || [];
                    
                    // Mettre à jour le titre
                    document.getElementById('tournament-title').textContent = tournament.name;
                    document.getElementById('tournament-name').value = tournament.name;
                    document.getElementById('num-pools').value = tournament.config.numPools;
                    document.getElementById('players-per-pool').value = tournament.config.playersPerPool;
                    document.getElementById('matches-per-pool').value = tournament.config.matchesPerPool;
                    
                    // Reconstruire les pools
                    const poolsContainer = document.getElementById('pools-container');
                    poolsContainer.innerHTML = '';
                    
                    tournament.pools.forEach((pool, poolIndex) => {
                        const poolDiv = document.createElement('div');
                        poolDiv.className = 'pool-group';
                        poolDiv.innerHTML = `
                            <h3>${pool.name}</h3>
                            ${pool.players.map((player, index) => `
                                <div class="player">
                                    <input type="text" value="${player.name || 'Joueur ' + (index + 1)}" 
                                           onchange="updatePlayerName(${poolIndex}, ${index}, this.value); saveToLocalStorage();">
                                    <span class="points" id="points-${poolIndex}-${index}">${player.totalPoints}</span>
                                </div>
                            `).join('')}
                        `;
                        poolsContainer.appendChild(poolDiv);
                    });
                    
                    // Sauvegarder dans le localStorage
                    saveToLocalStorage();
                    
                    // Réinitialiser les autres phases
                    document.getElementById('pool-matches-container').innerHTML = '';
                    document.getElementById('show-rankings-btn').classList.add('hidden');
                    document.getElementById('ranking-phase').classList.add('hidden');
                    document.getElementById('final-phase').classList.add('hidden');
                    document.getElementById('pool-phase').classList.remove('hidden');
                    
                    alert(`Tournoi "${tournament.name}" importé avec succès !`);
                } catch (error) {
                    alert("Erreur lors du chargement du fichier : " + error.message);
                }
            };
            reader.readAsText(file);
        }

        // Exporter les statistiques
        function exportStats() {
            const allPlayers = [];
            tournament.pools.forEach(pool => {
                allPlayers.push(...pool.players);
            });
            
            // Trier par points
            allPlayers.sort((a, b) => b.totalPoints - a.totalPoints);
            
            const statsData = {
                tournamentName: tournament.name,
                date: new Date().toISOString().slice(0, 10),
                totalPlayers: allPlayers.length,
                totalPools: tournament.pools.length,
                players: allPlayers.map(player => ({
                    name: player.name || `Joueur ${player.id}`,
                    totalPoints: player.totalPoints,
                    wins: player.wins,
                    matchesPlayed: player.matchesPlayed,
                    averagePoints: (player.totalPoints / player.matchesPlayed).toFixed(2) || 0
                }))
            };
            
            const blob = new Blob([JSON.stringify(statsData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `stats_${tournament.name || 'tournoi'}_${new Date().toISOString().slice(0, 10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Mise à jour du nom d'un joueur
        function updatePlayerName(poolIndex, playerIndex, name) {
            tournament.pools[poolIndex].players[playerIndex].name = name;
            saveToLocalStorage();
        }

        // Génération des matchs de poule
        function generatePoolMatches() {
            const matchesContainer = document.getElementById('pool-matches-container');
            matchesContainer.innerHTML = '';
            tournament.poolMatches = [];
            
            tournament.pools.forEach((pool, poolIndex) => {
                const poolMatchesDiv = document.createElement('div');
                poolMatchesDiv.className = 'pool-group';
                poolMatchesDiv.innerHTML = `<h3>Matchs - ${pool.name}</h3>`;
                
                const matchesDiv = document.createElement('div');
                matchesDiv.className = 'pool-matches';
                
                // Créer les matchs pour ce pool
                for (let matchNum = 1; matchNum <= tournament.config.matchesPerPool; matchNum++) {
                    const matchDiv = document.createElement('div');
                    matchDiv.className = 'match';
                    matchDiv.id = `match-${poolIndex}-${matchNum - 1}`;
                    
                    // Générer les options de rang en fonction du nombre de joueurs
                    const rankOptions = [];
                    for (let rank = 1; rank <= pool.players.length; rank++) {
                        const points = pool.players.length - rank + 1;
                        rankOptions.push(`<option value="${rank}">${rank}ème (${points} pt${points > 1 ? 's' : ''})</option>`);
                    }
                    
                    const matchHtml = `
                        <h4>Match ${matchNum}</h4>
                        <div class="match-result" id="match-result-${poolIndex}-${matchNum - 1}">
                            ${pool.players.map((player, index) => `
                                <div>
                                    <input type="text" value="${player.name || 'Joueur ' + (index + 1)}" readonly>
                                    <select id="rank-${poolIndex}-${matchNum - 1}-${index}" 
                                            onchange="updateRankOptions(${poolIndex}, ${matchNum - 1})">
                                        <option value="0">--</option>
                                        ${rankOptions.join('')}
                                    </select>
                                </div>
                            `).join('')}
                        </div>
                        <button onclick="recordPoolMatch(${poolIndex}, ${matchNum - 1})" id="match-btn-${poolIndex}-${matchNum - 1}">Enregistrer le match</button>
                    `;
                    matchDiv.innerHTML = matchHtml;
                    matchesDiv.appendChild(matchDiv);
                }
                
                poolMatchesDiv.appendChild(matchesDiv);
                matchesContainer.appendChild(poolMatchesDiv);
            });
            
            document.getElementById('show-rankings-btn').classList.remove('hidden');
            saveToLocalStorage();
        }

        // Mise à jour des options de rang en fonction des sélections
        function updateRankOptions(poolIndex, matchIndex) {
            const pool = tournament.pools[poolIndex];
            const selectedRanks = [];
            
            // Récupérer tous les rangs déjà sélectionnés dans ce match
            for (let i = 0; i < pool.players.length; i++) {
                const rank = parseInt(document.getElementById(`rank-${poolIndex}-${matchIndex}-${i}`).value);
                if (rank) selectedRanks.push(rank);
            }
            
            // Masquer les rangs déjà sélectionnés pour les autres joueurs
            for (let i = 0; i < pool.players.length; i++) {
                const select = document.getElementById(`rank-${poolIndex}-${matchIndex}-${i}`);
                const currentRank = parseInt(select.value);
                const options = select.querySelectorAll('option');
                
                options.forEach(opt => {
                    const rankValue = parseInt(opt.value);
                    if (rankValue && selectedRanks.includes(rankValue) && rankValue !== currentRank) {
                        opt.style.display = 'none';
                    } else {
                        opt.style.display = '';
                    }
                });
            }
        }

        // Enregistrement du résultat d'un match de poule
        function recordPoolMatch(poolIndex, matchIndex) {
            const pool = tournament.pools[poolIndex];
            const matchDiv = document.getElementById(`match-${poolIndex}-${matchIndex}`);
            const button = document.getElementById(`match-btn-${poolIndex}-${matchIndex}`);
            
            // Vérifier que tous les rangs sont attribués
            const ranks = [];
            for (let i = 0; i < pool.players.length; i++) {
                const rank = parseInt(document.getElementById(`rank-${poolIndex}-${matchIndex}-${i}`).value);
                ranks.push(rank);
            }
            
            const expectedRanks = Array.from({ length: pool.players.length }, (_, i) => i + 1);
            if (!ranks.every(r => r >= 1 && r <= pool.players.length) || new Set(ranks).size !== pool.players.length) {
                alert(`Veuillez attribuer un rang unique (1 à ${pool.players.length}) à chaque joueur.`);
                return;
            }
            
            // Attribuer les points et mettre à jour les stats
            for (let i = 0; i < pool.players.length; i++) {
                const rank = parseInt(document.getElementById(`rank-${poolIndex}-${matchIndex}-${i}`).value);
                const player = pool.players[i];
                const points = pool.players.length - rank + 1;
                player.totalPoints += points;
                player.matchesPlayed++;
                if (rank === 1) player.wins++;
            }
            
            // Mise à jour de l'affichage des points
            updatePoolPoints(poolIndex);
            
            // Changer le style du match et du bouton
            matchDiv.classList.add('recorded');
            button.textContent = 'Modifier';
            button.className = 'modify-btn';
            button.onclick = function() { modifyPoolMatch(poolIndex, matchIndex, button, matchDiv); };
            
            saveToLocalStorage();
        }

        // Modifier un match de poule
        function modifyPoolMatch(poolIndex, matchIndex, button, matchDiv) {
            const pool = tournament.pools[poolIndex];
            
            // Réinitialiser les points et stats des joueurs pour ce match
            for (let i = 0; i < pool.players.length; i++) {
                const rank = parseInt(document.getElementById(`rank-${poolIndex}-${matchIndex}-${i}`).value);
                const player = pool.players[i];
                const points = pool.players.length - rank + 1;
                player.totalPoints -= points;
                player.matchesPlayed--;
                if (rank === 1) player.wins--;
            }
            
            // Réinitialiser les options des menus déroulants
            for (let i = 0; i < pool.players.length; i++) {
                const select = document.getElementById(`rank-${poolIndex}-${matchIndex}-${i}`);
                const options = select.querySelectorAll('option');
                options.forEach(opt => opt.style.display = '');
                select.value = '0';
            }
            
            // Mise à jour de l'affichage des points
            updatePoolPoints(poolIndex);
            
            // Réinitialiser le style du match et du bouton
            matchDiv.classList.remove('recorded');
            button.textContent = 'Enregistrer le match';
            button.className = '';
            button.onclick = function() { recordPoolMatch(poolIndex, matchIndex); };
            
            saveToLocalStorage();
        }

        // Mise à jour des points des joueurs dans un pool
        function updatePoolPoints(poolIndex) {
            const pool = tournament.pools[poolIndex];
            pool.players.forEach((player, index) => {
                document.getElementById(`points-${poolIndex}-${index}`).textContent = player.totalPoints;
            });
        }

        // Afficher les classements des pools
        function showPoolRankings() {
            // Vérifier que tous les matchs sont enregistrés
            for (let poolIndex = 0; poolIndex < tournament.pools.length; poolIndex++) {
                for (let matchIndex = 0; matchIndex < tournament.config.matchesPerPool; matchIndex++) {
                    const matchDiv = document.getElementById(`match-${poolIndex}-${matchIndex}`);
                    if (!matchDiv.classList.contains('recorded')) {
                        alert(`Veuillez enregistrer tous les matchs de poule avant de continuer.`);
                        return;
                    }
                }
            }
            
            // Trier les joueurs de chaque pool par points
            tournament.pools.forEach(pool => {
                pool.players.sort((a, b) => b.totalPoints - a.totalPoints);
            });
            
            // Afficher les classements
            const rankingsContainer = document.getElementById('rankings-container');
            rankingsContainer.innerHTML = '';
            
            tournament.pools.forEach((pool, poolIndex) => {
                const poolRankingDiv = document.createElement('div');
                poolRankingDiv.className = 'pool-group';
                poolRankingDiv.innerHTML = `<h3>${pool.name}</h3>`;
                
                const table = document.createElement('table');
                table.className = 'ranking-table';
                table.innerHTML = `
                    <thead>
                        <tr>
                            <th>Position</th>
                            <th>Joueur</th>
                            <th>Points</th>
                            <th>Victoires</th>
                            <th>Matchs joués</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${pool.players.map((player, index) => `
                            <tr class="${index < 2 ? 'qualified' : ''}">
                                <td>${index + 1}</td>
                                <td>${player.name || 'Joueur ' + player.id}</td>
                                <td>${player.totalPoints}</td>
                                <td>${player.wins}</td>
                                <td>${player.matchesPlayed}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                `;
                poolRankingDiv.appendChild(table);
                rankingsContainer.appendChild(poolRankingDiv);
            });
            
            // Afficher les statistiques globales
            displayGlobalStats();
            
            // Masquer la phase de poule et afficher les classements
            document.getElementById('pool-phase').classList.add('hidden');
            document.getElementById('ranking-phase').classList.remove('hidden');
            
            saveToLocalStorage();
        }

        // Afficher les statistiques globales
        function displayGlobalStats() {
            const statsContainer = document.getElementById('stats-container');
            statsContainer.innerHTML = '';
            
            // Calculer les statistiques globales
            const allPlayers = [];
            tournament.pools.forEach(pool => {
                allPlayers.push(...pool.players);
            });
            
            // Trier par points
            allPlayers.sort((a, b) => b.totalPoints - a.totalPoints);
            
            // Top 3 joueurs
            const topPlayers = allPlayers.slice(0, 3);
            topPlayers.forEach((player, index) => {
                const statCard = document.createElement('div');
                statCard.className = 'stat-card';
                const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : '🥉';
                statCard.innerHTML = `
                    <h4>${medal} ${player.name || 'Joueur ' + player.id}</h4>
                    <p>${player.totalPoints} pts</p>
                    <p style="font-size: 14px; margin-top: 5px;">${player.wins} victoires</p>
                `;
                statsContainer.appendChild(statCard);
            });
            
            // Statistiques générales
            const totalMatches = tournament.pools.length * tournament.config.matchesPerPool;
            const avgPoints = (allPlayers.reduce((sum, player) => sum + player.totalPoints, 0) / allPlayers.length).toFixed(1);
            
            const totalStatsCard = document.createElement('div');
            totalStatsCard.className = 'stat-card';
            totalStatsCard.innerHTML = `
                <h4>📊 Statistiques Générales</h4>
                <p>${allPlayers.length} joueurs</p>
                <p style="font-size: 14px; margin-top: 5px;">${totalMatches} matchs joués</p>
                <p style="font-size: 14px; margin-top: 5px;">${avgPoints} pts/joueur</p>
            `;
            statsContainer.appendChild(totalStatsCard);
        }

        // Retour à la phase de poule
        function backToPoolPhase() {
            document.getElementById('pool-phase').classList.remove('hidden');
            document.getElementById('ranking-phase').classList.add('hidden');
        }

        // Finalisation de la phase de poule
        function finalizePoolPhase() {
            // Récupérer les 2 premiers de chaque pool pour la phase finale
            const finalists = [];
            tournament.pools.forEach(pool => {
                finalists.push(pool.players[0]);
                finalists.push(pool.players[1]);
            });
            
            // Générer le bracket
            generateBracket(finalists);
            
            // Masquer les classements et afficher la phase finale
            document.getElementById('ranking-phase').classList.add('hidden');
            document.getElementById('final-phase').classList.remove('hidden');
            
            saveToLocalStorage();
        }

        // Génération du bracket dynamique
        function generateBracket(players) {
            const bracketContainer = document.getElementById('bracket-container');
            bracketContainer.innerHTML = '';
            
            // Déterminer le nombre de tours nécessaires
            const numRounds = Math.ceil(Math.log2(players.length));
            tournament.finalBracket = [];
            
            // Initialiser les matchs pour chaque tour
            for (let round = 0; round < numRounds; round++) {
                tournament.finalBracket[round] = [];
            }
            
            // Remplir le premier tour avec les joueurs
            for (let i = 0; i < players.length; i += 2) {
                if (i + 1 < players.length) {
                    tournament.finalBracket[0].push({
                        player1: players[i],
                        player2: players[i + 1],
                        winner: null,
                        selectedWinner: null
                    });
                } else {
                    // Si nombre impair, le dernier joueur a un "bye"
                    tournament.finalBracket[0].push({
                        player1: players[i],
                        player2: { name: 'Bye', isBye: true },
                        winner: players[i],
                        selectedWinner: 0
                    });
                }
            }
            
            // Afficher chaque tour
            for (let round = 0; round < numRounds; round++) {
                const roundDiv = document.createElement('div');
                roundDiv.className = 'bracket-round';
                
                let roundName;
                switch (round) {
                    case 0:
                        roundName = numRounds > 3 ? 'Tour 1' : (numRounds === 3 ? 'Quarts de Finale' : (numRounds === 2 ? 'Demi-Finales' : 'Finale'));
                        break;
                    case 1:
                        roundName = numRounds > 3 ? 'Tour 2' : (numRounds === 3 ? 'Demi-Finales' : 'Finale');
                        break;
                    case 2:
                        roundName = numRounds > 3 ? 'Quarts de Finale' : 'Finale';
                        break;
                    default:
                        roundName = `Tour ${round + 1}`;
                }
                
                roundDiv.innerHTML = `<h3>${roundName}</h3>`;
                
                const rowDiv = document.createElement('div');
                rowDiv.className = 'bracket-row';
                
                tournament.finalBracket[round].forEach((match, matchIndex) => {
                    const matchDiv = document.createElement('div');
                    matchDiv.className = 'bracket-match';
                    matchDiv.id = `bracket-match-${round}-${matchIndex}`;
                    
                    const player1Name = match.player1.name || `Joueur ${match.player1.id}`;
                    const player2Name = match.player2.isBye ? 'Bye' : (match.player2.name || `Joueur ${match.player2.id}`);
                    
                    matchDiv.innerHTML = `
                        <div class="teams">
                            <div class="team ${match.winner === match.player1 ? 'winner' : ''}" 
                                 onclick="${match.player2.isBye ? '' : `selectWinner(${round}, ${matchIndex}, 0)`}">
                                ${player1Name}
                            </div>
                            <div class="team ${match.winner === match.player2 ? 'winner' : ''} ${match.player2.isBye ? 'by' : ''}" 
                                 onclick="${match.player2.isBye ? '' : `selectWinner(${round}, ${matchIndex}, 1)`}">
                                ${player2Name}
                            </div>
                        </div>
                        ${match.player2.isBye ? '' : `<button onclick="confirmWinner(${round}, ${matchIndex})" id="confirm-btn-${round}-${matchIndex}" ${match.winner ? 'disabled' : ''}>Confirmer le vainqueur</button>`}
                    `;
                    rowDiv.appendChild(matchDiv);
                });
                
                roundDiv.appendChild(rowDiv);
                bracketContainer.appendChild(roundDiv);
                
                // Ajouter un connecteur visuel (sauf après le dernier tour)
                if (round < numRounds - 1) {
                    const connector = document.createElement('div');
                    connector.className = 'bracket-connector';
                    bracketContainer.appendChild(connector);
                }
            }
            
            saveToLocalStorage();
        }

        // Sélection du vainqueur dans un match
        function selectWinner(round, matchIndex, teamIndex) {
            const match = tournament.finalBracket[round][matchIndex];
            const matchDiv = document.getElementById(`bracket-match-${round}-${matchIndex}`);
            const teams = matchDiv.querySelectorAll('.team');
            
            // Réinitialiser les sélections
            teams.forEach(team => team.classList.remove('selected'));
            
            // Sélectionner le vainqueur
            teams[teamIndex].classList.add('selected');
            match.selectedWinner = teamIndex;
            
            // Activer le bouton de confirmation
            document.getElementById(`confirm-btn-${round}-${matchIndex}`).disabled = false;
        }

        // Confirmer le vainqueur d'un match
        function confirmWinner(round, matchIndex) {
            const match = tournament.finalBracket[round][matchIndex];
            const matchDiv = document.getElementById(`bracket-match-${round}-${matchIndex}`);
            const teams = matchDiv.querySelectorAll('.team');
            
            if (match.selectedWinner === null && !match.player2.isBye) {
                alert("Veuillez sélectionner un vainqueur.");
                return;
            }
            
            // Marquer le vainqueur
            if (!match.player2.isBye) {
                teams[match.selectedWinner].classList.add('winner');
                teams[match.selectedWinner].classList.remove('selected');
            }
            match.winner = match.player2.isBye ? match.player1 : (match.selectedWinner === 0 ? match.player1 : match.player2);
            
            // Désactiver le bouton de confirmation
            if (!match.player2.isBye) {
                document.getElementById(`confirm-btn-${round}-${matchIndex}`).disabled = true;
            }
            
            // Vérifier si tous les matchs du tour actuel sont confirmés
            const allMatchesConfirmed = tournament.finalBracket[round].every(m => m.winner !== null);
            if (allMatchesConfirmed && round < tournament.finalBracket.length - 1) {
                // Passer au tour suivant
                const nextRound = round + 1;
                tournament.finalBracket[nextRound] = [];
                
                for (let i = 0; i < tournament.finalBracket[round].length; i += 2) {
                    if (i + 1 < tournament.finalBracket[round].length) {
                        tournament.finalBracket[nextRound].push({
                            player1: tournament.finalBracket[round][i].winner,
                            player2: tournament.finalBracket[round][i + 1].winner,
                            winner: null,
                            selectedWinner: null
                        });
                    } else {
                        // Si nombre impair, le dernier joueur a un "bye"
                        tournament.finalBracket[nextRound].push({
                            player1: tournament.finalBracket[round][i].winner,
                            player2: { name: 'Bye', isBye: true },
                            winner: tournament.finalBracket[round][i].winner,
                            selectedWinner: 0
                        });
                    }
                }
                
                // Mettre à jour l'affichage du tour suivant
                updateNextRound(nextRound);
            } else if (allMatchesConfirmed && round === tournament.finalBracket.length - 1) {
                // C'est la finale, afficher le vainqueur
                alert(`Félicitations à ${match.winner.name}, vainqueur du tournoi ${tournament.name} !`);
            }
            
            saveToLocalStorage();
        }

        // Mettre à jour l'affichage du tour suivant
        function updateNextRound(round) {
            const bracketContainer = document.getElementById('bracket-container');
            
            // Trouver le tour suivant dans le DOM
            const rounds = bracketContainer.querySelectorAll('.bracket-round');
            if (rounds[round]) {
                const rowDiv = rounds[round].querySelector('.bracket-row');
                if (rowDiv) {
                    rowDiv.innerHTML = '';
                    
                    tournament.finalBracket[round].forEach((match, matchIndex) => {
                        const matchDiv = document.createElement('div');
                        matchDiv.className = 'bracket-match';
                        matchDiv.id = `bracket-match-${round}-${matchIndex}`;
                        
                        const player1Name = match.player1.name || `Joueur ${match.player1.id}`;
                        const player2Name = match.player2.isBye ? 'Bye' : (match.player2.name || `Joueur ${match.player2.id}`);
                        
                        matchDiv.innerHTML = `
                            <div class="teams">
                                <div class="team ${match.winner === match.player1 ? 'winner' : ''}" 
                                     onclick="${match.player2.isBye ? '' : `selectWinner(${round}, ${matchIndex}, 0)`}">
                                    ${player1Name}
                                </div>
                                <div class="team ${match.winner === match.player2 ? 'winner' : ''} ${match.player2.isBye ? 'by' : ''}" 
                                     onclick="${match.player2.isBye ? '' : `selectWinner(${round}, ${matchIndex}, 1)`}">
                                    ${player2Name}
                                </div>
                            </div>
                            ${match.player2.isBye ? '' : `<button onclick="confirmWinner(${round}, ${matchIndex})" id="confirm-btn-${round}-${matchIndex}" ${match.winner ? 'disabled' : ''}>Confirmer le vainqueur</button>`}
                        `;
                        rowDiv.appendChild(matchDiv);
                    });
                }
            }
            
            saveToLocalStorage();
        }

        // Changer de thème
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }

        // Changer de thème de couleur
        function changeColorTheme() {
            const colorTheme = document.getElementById('color-theme').value;
            const root = document.documentElement;
            
            switch (colorTheme) {
                case 'green':
                    root.style.setProperty('--primary-color', '#34A853');
                    root.style.setProperty('--secondary-color', '#2E7D32');
                    root.style.setProperty('--button-color', '#34A853');
                    root.style.setProperty('--button-hover', '#2E7D32');
                    break;
                case 'red':
                    root.style.setProperty('--primary-color', '#EA4335');
                    root.style.setProperty('--secondary-color', '#C62828');
                    root.style.setProperty('--button-color', '#EA4335');
                    root.style.setProperty('--button-hover', '#C62828');
                    break;
                case 'purple':
                    root.style.setProperty('--primary-color', '#9C27B0');
                    root.style.setProperty('--secondary-color', '#7B1FA2');
                    root.style.setProperty('--button-color', '#9C27B0');
                    root.style.setProperty('--button-hover', '#7B1FA2');
                    break;
                default:
                    root.style.setProperty('--primary-color', '#2196F3');
                    root.style.setProperty('--secondary-color', '#4CAF50');
                    root.style.setProperty('--button-color', '#2196F3');
                    root.style.setProperty('--button-hover', '#0b7dda');
            }
            
            localStorage.setItem('colorTheme', colorTheme);
        }

        // Charger les préférences de thème au démarrage
        window.onload = function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            const savedColorTheme = localStorage.getItem('colorTheme') || 'default';
            
            setTheme(savedTheme);
            document.getElementById('color-theme').value = savedColorTheme;
            changeColorTheme();
            
            // Charger le tournoi depuis le localStorage
            loadFromLocalStorage();
        };
    </script>
</body>
